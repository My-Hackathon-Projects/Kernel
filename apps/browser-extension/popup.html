<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kernel Intake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <p>Kernel</p>
        <h1>Workflow intake</h1>
      </header>

      <label>
        Source text
        <textarea
          id="sourceText"
          placeholder="Select workflow text on the page, or paste email/spreadsheet text here."
        ></textarea>
      </label>

      <div class="actions">
        <button id="readPage" type="button">Read current page</button>
        <button id="extract" type="button">Extract fields</button>
      </div>

      <section id="result" class="result" hidden></section>
      <p id="error" class="error" hidden></p>

      <button id="openConsole" type="button" disabled>Open in Kernel</button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
